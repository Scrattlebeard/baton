<!-- Baton UI — static design showcase. Hardcoded content, skin switcher,
     demo apparatus. The LIVE app is index.html (backend-driven). This page
     exists to prove the reskin-from-tokens claim with no server. -->
<!DOCTYPE html>
<html lang="en" data-theme="default" data-mode="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baton UI — showcase</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="themes/greenmarch.css">
<link rel="stylesheet" href="themes/neon-tithe.css">
<link rel="stylesheet" href="themes/folio.css">
</head>
<body>
<div class="app" data-sheet="false">

  <!-- ============================ TOP BAR ============================ -->
  <header class="topbar">
    <span class="brand"><span class="brand__baton"></span>Baton</span>
    <span class="topbar__story" id="story-title">Untitled Story</span>
    <span class="topbar__spacer"></span>

    <div class="session" id="session" data-state="watching" title="Session state">
      <span class="session__dot"></span>
      <span id="session-label">watching for changes</span>
    </div>

    <div class="skin" role="group" aria-label="Story skin">
      <button class="skin__btn" data-skin="default"    aria-pressed="true">Default</button>
      <button class="skin__btn" data-skin="greenmarch" aria-pressed="false">Greenmarch</button>
      <button class="skin__btn" data-skin="neon-tithe" aria-pressed="false">Neon&nbsp;Tithe</button>
      <button class="skin__btn" data-skin="folio"      aria-pressed="false">Folio</button>
    </div>
    <button class="mode-toggle" id="mode-toggle" title="Toggle light / dark (default theme)">☾</button>
  </header>

  <!-- ============================ LEFT RAIL ============================ -->
  <nav class="rail" aria-label="Story files">
    <button class="rail__tab" data-pull="sheet" data-title="Sheet" data-file="sheet.md" data-live="true" title="Sheet · sheet.md">
      <span class="rail__mark">S<span class="rail__live"></span></span>
      <span class="rail__name">Sheet</span>
    </button>
    <button class="rail__tab" data-pull="canon" data-title="Canon" data-file="surface.md" title="Canon · surface.md">
      <span class="rail__mark">C<span class="rail__live"></span></span>
      <span class="rail__name">Canon</span>
    </button>
    <button class="rail__tab" data-pull="map" data-title="Map" data-file="map.md" title="Map · map.md">
      <span class="rail__mark">M<span class="rail__live"></span></span>
      <span class="rail__name">Map</span>
    </button>
  </nav>

  <!-- ============================ STREAM ============================ -->
  <main class="stream" id="stream">
    <div class="stream__inner">

      <!-- resume banner — a bookmark ribbon -->
      <aside class="resume" id="resume">
        <span class="resume__ribbon"></span>
        <div class="resume__eyebrow">Resume · pick up the baton</div>
        <p class="resume__where" id="resume-where"></p>
        <p class="resume__next">Next: <b id="resume-next"></b></p>
        <button class="resume__dismiss" id="resume-dismiss" title="Dismiss" aria-label="Dismiss">×</button>
      </aside>

      <h1 class="scene-heading" id="scene-heading"></h1>

      <div class="prose" id="prose-a"></div>

      <span class="scene-break" role="separator" aria-label="scene break"></span>

      <div class="prose" id="prose-b"></div>

      <!-- inline scene illustration — expand / collapse -->
      <figure class="figure" data-open="true">
        <button class="figure__bar" data-figure>
          <span class="figure__chev">▶</span>
          <span class="figure__label">Scene</span>
          <span class="figure__cap" id="fig-cap"></span>
        </button>
        <div class="figure__media">
          <div class="slot figure__slot" id="fig-slot">scene illustration</div>
          <figcaption class="figure__caption" id="fig-caption"></figcaption>
        </div>
      </figure>

      <!-- player turn — manuscript margin -->
      <div class="turn">
        <span class="turn__hand">you</span>
        <p id="turn-text"></p>
      </div>

      <!-- public dice roll — resolved in the open -->
      <div class="roll" id="roll">
        <span class="roll__label" id="roll-label"></span>
        <span class="roll__dice" id="roll-dice"></span>
        <span class="roll__op" id="roll-mod"></span>
        <span class="roll__op">=</span>
        <span class="roll__total" id="roll-total"></span>
        <span class="roll__note" id="roll-note"></span>
      </div>

      <!-- model prose, streaming -->
      <div class="prose" id="prose-c"></div>

    </div>
  </main>

  <!-- ============================ NOTARY ============================ -->
  <div class="notary" id="notary" title="GM provenance — that the world reacted, and when; never what">
    <span class="notary__glyph">🎲</span>
    <span class="notary__text" id="notary-text"></span>
    <span class="notary__sep">·</span>
    <span>sealed ruling committed</span>
    <span class="seal" id="notary-seal"></span>
    <span class="notary__time" id="notary-time"></span>
  </div>

  <!-- ============================ SIDEBAR (cast) ============================ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__inner">
      <section class="cast">
        <div class="panel__head"><span class="panel__title">Cast</span></div>
        <p class="cast__empty" id="cast-empty"></p>
        <div class="cast__list" id="cast-list"></div>
      </section>
    </div>
  </aside>

  <!-- ============================ COMPOSER ============================ -->
  <div class="composer-bar">
    <div class="composer" id="composer" data-disabled="true">
      <div class="mobile-bar">
        <button class="mobile-bar__btn" data-pull="sheet">Sheet<span class="dot"></span></button>
        <button class="mobile-bar__btn" data-pull="canon">Canon</button>
        <button class="mobile-bar__btn" data-pull="map">Map</button>
        <button class="mobile-bar__btn" data-cast>Cast</button>
      </div>
      <div class="composer__chips"></div>
      <div class="composer__field">
        <textarea class="composer__input" id="composer-input" rows="1" placeholder="Write freely — this is your turn."></textarea>
        <button class="composer__send" id="composer-send">Send</button>
      </div>
      <p class="composer__hint" id="composer-hint"></p>
    </div>
  </div>

  <!-- ============================ PULL-OUT PANELS ============================ -->
  <div class="pullout" id="pullout" data-open="false" data-active="sheet" data-live="true">
    <div class="pullout__panel">
      <header class="pullout__head">
        <span class="pullout__title" id="pull-title">Sheet</span>
        <span class="pullout__file" id="pull-file">sheet.md</span>
        <span class="pullout__live" title="file changed"></span>
        <button class="pullout__close" id="pull-close" aria-label="Close">×</button>
      </header>
      <div class="pullout__body">
        <div class="pullout__doc" data-doc="sheet"><div class="md" id="drawer-sheet"></div></div>
        <div class="pullout__doc" data-doc="canon"><div class="md" id="drawer-canon"></div></div>
        <div class="pullout__doc" data-doc="map"><div class="slot map-slot" id="drawer-map">map</div></div>
      </div>
    </div>
  </div>
  <div class="pullout-backdrop" id="pullout-backdrop"></div>

  <div class="sheet-backdrop" id="sheet-backdrop"></div>
</div>

<!-- ===================== DEMO APPARATUS (scaffolding) ===================== -->
<div class="demo" id="demo" data-collapsed="false">
  <button class="demo__collapse" id="demo-collapse" title="Collapse">–</button>
  <div class="demo__body">
    <div>
      <div class="demo__label">Composer</div>
      <div class="demo__row">
        <button class="demo__btn" data-writing="true" aria-pressed="true">Narrator writing</button>
        <button class="demo__btn" data-writing="false" aria-pressed="false">Your turn</button>
      </div>
    </div>
    <div>
      <div class="demo__label">Session state</div>
      <div class="demo__row">
        <button class="demo__btn" data-session="connecting">Connecting</button>
        <button class="demo__btn" data-session="watching" aria-pressed="true">Watching</button>
        <button class="demo__btn" data-session="error">Error</button>
      </div>
    </div>
  </div>
</div>

<script src="demo.js"></script>
</body>
</html>
